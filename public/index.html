<!DOCTYPE html>
<html>
<head>
  <title>Crypto AI</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: monospace;
      text-align: center;
    }

    input, button {
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 10px;
      margin: 5px;
    }

    .big { font-size: 24px; }

    .buy { color: lime; }
    .sell { color: red; }
    .wait { color: yellow; }

    .positive { color: lime; }
    .negative { color: red; }
  </style>
</head>

<body>

<h1>CRYPTO AI TERMINAL</h1>

<input id="priceInput" placeholder="Precio">
<br>

<button onclick="setBuy()">Guardar Compra</button>
<button onclick="setSell()">Guardar Venta</button>

<div class="big" id="positionLine"></div>

<div class="big" id="price"></div>
<div id="prediction"></div>
<div id="rsi"></div>

<div class="big" id="signal"></div>

<script>
async function setBuy() {
  const val = document.getElementById("priceInput").value;
  await fetch(`/set-buy/${val}`);
}

async function setSell() {
  const val = document.getElementById("priceInput").value;
  await fetch(`/set-sell/${val}`);
}

async function loadData() {
  const res = await fetch("/btc");
  const d = await res.json();

  document.getElementById("price").innerText =
    "BTC: " + d.current.toFixed(2);

  document.getElementById("prediction").innerText =
    "Prediction: " + (d.prediction * 100).toFixed(2) + "%";

  document.getElementById("rsi").innerText =
    "RSI: " + d.rsi.toFixed(2);

  // 🧠 LINEA PRINCIPAL
  const line = document.getElementById("positionLine");

  if (d.position === "BUY") {
    const pct = d.percent.toFixed(2);
    line.innerText = `Precio Compra: ${d.buy} - ${pct}%`;
    line.className = "big " + (pct >= 0 ? "positive" : "negative");
  }

  if (d.position === "SELL") {
    const pct = d.percent.toFixed(2);
    line.innerText = `Precio Venta: ${d.sell} - ${pct}%`;
    line.className = "big " + (pct >= 0 ? "positive" : "negative");
  }

  if (!d.position) {
    line.innerText = "";
  }

  const signalEl = document.getElementById("signal");
  signalEl.innerText = d.signal;

  signalEl.className = "big " +
    (d.signal === "BUY" ? "buy" :
     d.signal === "SELL" ? "sell" : "wait");
}

setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
